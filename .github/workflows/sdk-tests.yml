name: SDK Tests

on:
  push:
    branches: [main]
    paths:
      - 'finverify-terminal/sdk/**'
      - '.github/workflows/sdk-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'finverify-terminal/sdk/**'
      - '.github/workflows/sdk-tests.yml'

jobs:
  sdk-tests:
    name: SDK test suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finverify-terminal/sdk
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('finverify-terminal/sdk/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install SDK
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run SDK tests
        run: python -m tests.test_dvl

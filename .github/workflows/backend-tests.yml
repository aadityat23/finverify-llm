name: Backend Tests

on:
  push:
    branches: [main]
    paths:
      - 'finverify-terminal/backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'finverify-terminal/backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  backend-tests:
    name: Backend pytest suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: finverify-terminal/backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('finverify-terminal/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q
